<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gotham Films">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Gotham Films</title>
<style>
:root{--y:#FFD700;--b:#000;--dim:#444;--font:-apple-system,"SF Pro Display",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;color:var(--y);font-family:var(--font);overflow:hidden;}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;}
.topbar{height:56px;display:flex;align-items:center;padding:0 12px;flex-shrink:0;background:#000;}
.menu-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:none;border:none;color:var(--y);flex-shrink:0;}
.topbar-logo{width:40px;height:40px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;overflow:hidden;}
.topbar-logo img{width:31px;height:31px;object-fit:contain;}
.divider{height:2px;background:var(--y);flex-shrink:0;}
#content{flex:1;min-height:0;position:relative;}

/* ── PAGES ── */
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;background:#000;visibility:hidden;pointer-events:none;}
.page.active{visibility:visible;pointer-events:all;}

/* ── DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;}
.overlay.on{display:block;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:88px;background:#000;border-right:2px solid var(--y);z-index:101;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;}
.drawer.on{transform:translateX(0);}
.drawer-head{padding:20px 0 14px;display:flex;flex-direction:column;align-items:center;gap:7px;background:#0a0a0a;}
.drawer-circle{width:60px;height:60px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.drawer-circle img{width:47px;height:47px;object-fit:contain;}
.drawer-lbl{font-size:9px;font-weight:900;letter-spacing:3px;}
.d-item{height:72px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;background:none;border:none;border-bottom:1px solid #111;width:100%;color:inherit;}
.d-item.active{background:rgba(255,215,0,.12);}

/* ── ROULETTE ── */
.toggle-wrap{padding:12px 16px 6px;flex-shrink:0;}
.toggle-btn{width:100%;padding:14px;font-size:15px;font-weight:700;letter-spacing:1.5px;border:2px solid var(--y);cursor:pointer;font-family:var(--font);transition:background .2s,color .2s;}
.toggle-btn.movies{background:var(--y);color:#000;border-color:var(--y);}
.toggle-btn.solo{background:#000;color:var(--y);border-color:var(--y);}
.slot-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px 0;}
.slot-outer{width:100%;padding:3px;background:var(--y);}
.slot-inner{background:#000;padding:16px;}
.arrows{display:flex;justify-content:space-between;font-size:14px;}
.slot-display{height:100px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:8px 0;position:relative;}
.slot-txt{font-size:20px;font-weight:700;text-align:center;line-height:1.3;padding:0 8px;position:absolute;width:100%;}
.slot-count{color:var(--dim);font-size:12px;margin-top:14px;}
.roll-wrap{padding:16px;padding-bottom:max(24px,env(safe-area-inset-bottom));flex-shrink:0;}
.roll-btn{width:100%;padding:18px;font-size:20px;font-weight:900;letter-spacing:2px;background:var(--y);color:#000;border:none;cursor:pointer;font-family:var(--font);}
.roll-btn:disabled{opacity:.4;}
.roll-btn:active:not(:disabled){transform:scale(.98);}

/* ── LISTS ── */
.lists-scroll{padding:16px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.list-card{border:1px solid var(--y);padding:16px;}
.list-card-head{display:flex;align-items:center;margin-bottom:10px;}
.list-card-title{flex:1;font-size:11px;font-weight:700;letter-spacing:2px;}
.save-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--y);padding:4px 8px;}
.list-ta{width:100%;min-height:200px;background:#000;color:var(--y);border:none;outline:none;font-size:14px;font-family:monospace;resize:vertical;line-height:1.8;caret-color:var(--y);}
.list-ta::placeholder{color:#333;}
.list-hint{font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5;}

/* ── WATCHED ── */
.watched-inner{display:flex;flex-direction:column;}
.w-item{border-bottom:1px solid var(--y);position:relative;overflow:hidden;cursor:pointer;-webkit-user-select:none;user-select:none;}
.w-item:first-child{border-top:1px solid var(--y);}
.w-txt{padding:16px;font-size:15px;line-height:1.4;position:relative;z-index:2;}
.w-item.fav .w-txt{color:#000;}
.w-bg{position:absolute;inset:0;background:var(--y);transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:0;}
.w-item.fav .w-bg{transform:scaleX(1);}
.w-prog{position:absolute;inset:0;background:rgba(255,215,0,.22);transform:scaleX(0);transform-origin:left;z-index:1;}
.w-empty{padding:60px 20px;text-align:center;color:var(--dim);font-size:14px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--y);color:#000;padding:10px 24px;font-size:13px;font-weight:700;letter-spacing:1px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

          onmousedown="tholdStart()" ontouchstart="tholdStart()"
          onmouseup="tholdEnd()" ontouchend="tholdEnd()"
          onmouseleave="tholdEnd()" ontouchcancel="tholdEnd()">MOVIES</button>
      </div>
      <div class="slot-area">
        <div class="slot-outer"><div class="slot-inner">
          <div class="arrows"><span>▶</span><span>◀</span></div>
          <div class="slot-display"><div class="slot-txt" id="stxt">— — —</div></div>
          <div class="arrows"><span>▶</span><span>◀</span></div>
        </div></div>
        <div class="slot-count" id="scnt">🎬 0 фильмов</div>
      </div>
      <div class="roll-wrap">
        <button class="roll-btn" id="rbtn" onclick="spin()">🎰 ROLL</button>
      </div>
    </div>

    <!-- LISTS PAGE -->
    <div class="page" id="pg-lists">
      <div class="lists-scroll">
        <div class="list-card">
          <div class="list-card-head">
            <div class="list-card-title">👤 SOLO.txt</div>
            <button class="save-btn" onclick="dlFile('solo')">💾</button>
          </div>
          <textarea class="list-ta" id="ta-solo" placeholder="Вводи фильмы — каждый с новой строки..." oninput="sync('solo')"></textarea>
          <div class="list-hint">Каждый фильм — отдельная строка. Сохраняется автоматически.</div>
        </div>
        <div class="list-card">
          <div class="list-card-head">
            <div class="list-card-title">🎬 movies.txt</div>
            <button class="save-btn" onclick="dlFile('movies')">💾</button>
          </div>
          <textarea class="list-ta" id="ta-movies" placeholder="Вводи фильмы — каждый с новой строки..." oninput="sync('movies')"></textarea>
          <div class="list-hint">Каждый фильм — отдельная строка. Сохраняется автоматически.</div>
        </div>
      </div>
    </div>

    <!-- WATCHED PAGE -->
    <div class="page" id="pg-watched">
      <div id="wbody" class="watched-inner"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────
const get = k => { try{return JSON.parse(localStorage.getItem(k)||'null')}catch(e){return null} };
const set = (k,v) => localStorage.setItem(k,JSON.stringify(v));
const getSolo=()=>get('solo')||[];
const getMovies=()=>get('movies')||[];
const getWatched=()=>get('watched')||[];
const setSolo=v=>set('solo',v);
const setMovies=v=>set('movies',v);
const setWatched=v=>set('watched',v);

// ── NAVIGATION ───────────────────────────────────────────
const PAGES=['roulette','lists','watched'];
let curPage='';

function go(page){
  PAGES.forEach((p,i)=>{
    document.getElementById('pg-'+p).classList.toggle('active', p===page);
    document.getElementById('n'+i).classList.toggle('active', p===page);
  });
  curPage=page;
  closeDrawer();
  if(page==='roulette') refreshRoulette();
  if(page==='lists')    loadLists();
  if(page==='watched')  renderWatched();
}

window.addEventListener('load',()=>go('roulette'));

// ── DRAWER ───────────────────────────────────────────────
function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('ov').classList.add('on');}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('ov').classList.remove('on');}

// ── ROULETTE ─────────────────────────────────────────────
let isSolo=false, spinning=false, tHoldTmr=null;

function activeList(){return isSolo?getSolo():getMovies();}

function refreshRoulette(){
  const tog=document.getElementById('tog');
  tog.textContent=isSolo?'SOLO':'MOVIES';
  tog.className='toggle-btn '+(isSolo?'solo':'movies');
  const n=activeList().length;
  document.getElementById('scnt').textContent=`🎬 ${n} фильмов · ${isSolo?'solo':'movies'}`;
}

function tholdStart(){
  tHoldTmr=setTimeout(()=>{
    isSolo=!isSolo; refreshRoulette();
    if(navigator.vibrate) navigator.vibrate(40);
  },2000);
}
function tholdEnd(){clearTimeout(tHoldTmr);}

function spin(){
  if(spinning) return;
  const list=activeList();
  if(!list.length){toast('Список пуст — добавь фильмы в 🎲');return;}
  spinning=true;
  const rb=document.getElementById('rbtn');
  rb.disabled=true; rb.textContent='⚡ ...';
  const el=document.getElementById('stxt');
  el.style.color='#555';
  el.style.transition='none';

  const total=28+Math.floor(Math.random()*12);
  let tick=0;

  function next(){
    if(tick>=total){finalize(list);return;}
    const title=list[Math.floor(Math.random()*list.length)];
    el.style.transition='transform .06s ease,opacity .06s ease';
    el.style.transform='translateY(-50px)';
    el.style.opacity='0';
    setTimeout(()=>{
      el.textContent=title;
      el.style.transition='none';
      el.style.transform='translateY(50px)';
      el.style.opacity='0';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.transition='transform .06s ease,opacity .06s ease';
        el.style.transform='translateY(0)';
        el.style.opacity='1';
      }));
    },65);
    const d=tick<10?90:tick<20?130:tick<26?190:260+(tick-26)*60;
    tick++;
    setTimeout(next,d);
  }
  next();
}

function finalize(list){
  const chosen=list[Math.floor(Math.random()*list.length)];
  const el=document.getElementById('stxt');
  el.style.transition='none';
  el.textContent=chosen;
  el.style.color='#FFD700';
  el.style.transform='translateY(0)';
  el.style.opacity='1';
  let f=0;
  const iv=setInterval(()=>{
    el.style.opacity=el.style.opacity==='0.15'?'1':'0.15';
    if(++f>=10){clearInterval(iv);el.style.opacity='1';}
  },180);
  if(isSolo) setSolo(getSolo().filter(t=>t!==chosen));
  else setMovies(getMovies().filter(t=>t!==chosen));
  const w=getWatched(); w.unshift({title:chosen,fav:false}); setWatched(w);
  refreshRoulette();
  setTimeout(()=>{
    spinning=false;
    const rb=document.getElementById('rbtn');
    rb.disabled=false; rb.textContent='🎰 ROLL';
  },1800);
}

// ── LISTS ────────────────────────────────────────────────
function loadLists(){
  document.getElementById('ta-solo').value=getSolo().join('\n');
  document.getElementById('ta-movies').value=getMovies().join('\n');
}
function sync(type){
  const raw=document.getElementById('ta-'+type).value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  if(type==='solo') setSolo(lines); else setMovies(lines);
}
function dlFile(type){
  const list=type==='solo'?getSolo():getMovies();
  const blob=new Blob([list.join('\n')],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=type==='solo'?'SOLO.txt':'movies.txt'; a.click();
  toast('💾 Файл сохранён');
}

// ── WATCHED ──────────────────────────────────────────────
function renderWatched(){
  const w=getWatched();
  const sorted=[...w.filter(m=>m.fav),...w.filter(m=>!m.fav)];
  const el=document.getElementById('wbody');
  if(!sorted.length){el.innerHTML='<div class="w-empty">Пока нет просмотренных фильмов</div>';return;}
  el.innerHTML=sorted.map((m,i)=>`
    <div class="w-item${m.fav?' fav':''}"
      ontouchstart="hStart(this,'${m.title.replace(/'/g,"\\'")}');" ontouchend="hEnd();" ontouchcancel="hEnd();"
      onmousedown="hStart(this,'${m.title.replace(/'/g,"\\'")}');" onmouseup="hEnd();" onmouseleave="hEnd();">
      <div class="w-prog" id="hp${i}"></div>
      <div class="w-bg"></div>
      <div class="w-txt">${m.title}</div>
    </div>`).join('');
}

let hTmr=null,hRaf=null,hEl=null,hT0=null,hTitle=null;
function hStart(el,title){
  hEl=el; hT0=Date.now(); hTitle=title;
  const hp=el.querySelector('.w-prog');
  function tick(){ const p=Math.min((Date.now()-hT0)/2000,1); if(hp) hp.style.transform=`scaleX(${p})`; if(p<1) hRaf=requestAnimationFrame(tick); }
  hRaf=requestAnimationFrame(tick);
  hTmr=setTimeout(()=>{
    const w=getWatched(),i=w.findIndex(m=>m.title===title);
    if(i!==-1){w[i].fav=!w[i].fav;setWatched(w);}
    if(navigator.vibrate) navigator.vibrate(50);
    cancelAnimationFrame(hRaf);
    renderWatched();
  },2000);
}
function hEnd(){
  clearTimeout(hTmr); cancelAnimationFrame(hRaf);
  if(hEl){const hp=hEl.querySelector('.w-prog');if(hp) hp.style.transform='scaleX(0)';hEl=null;}
}

// ── TOAST ────────────────────────────────────────────────
let tTmr=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(tTmr); tTmr=setTimeout(()=>t.classList.remove('on'),2200);
}

// ── SERVICE WORKER ───────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
